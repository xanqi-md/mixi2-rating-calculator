name: Deploy and Run Bot (gRPC Stream Mode)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'stream'
        type: choice
        options:
          - stream
          - webhook

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # Keep running for up to 6 hours (GitHub Actions max for public repos)
    timeout-minutes: 360
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install dependencies
        run: sudo apt-get install -y gcc libsqlite3-dev

      - name: Build bot
        run: CGO_ENABLED=1 go build -o bin/${{ github.event.inputs.mode }} ./cmd/${{ github.event.inputs.mode }}

      - name: Run bot (${{ github.event.inputs.mode }} mode)
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          TOKEN_URL: ${{ secrets.TOKEN_URL }}
          API_ADDRESS: ${{ secrets.API_ADDRESS }}
          STREAM_ADDRESS: ${{ secrets.STREAM_ADDRESS }}
          SIGNATURE_PUBLIC_KEY: ${{ secrets.SIGNATURE_PUBLIC_KEY }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          PORT: ${{ secrets.PORT }}
          DB_PATH: /home/runner/work/ratings.db
        run: |
          echo "🚀 Starting OpenSkill Rating Bot in ${{ github.event.inputs.mode }} mode..."
          ./bin/${{ github.event.inputs.mode }}
